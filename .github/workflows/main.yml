name: Build CardRedeem Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Unzip plugin source
        run: unzip CardRedeem-plugin-source-1.zip -d plugin
      - name: Build with Maven
        run: cd plugin && mvn package -q
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: CardRedeem
          path: plugin/target/CardRedeem.jar
