name: Build CardRedeem Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Unzip plugin source
        run: unzip CardRedeem-plugin-source-1.zip -d plugin
      - name: Fix Java version in pom.xml
        run: sed -i 's/<maven.compiler.source>17<\/maven.compiler.source>/<maven.compiler.source>21<\/maven.compiler.source>/; s/<maven.compiler.target>17<\/maven.compiler.target>/<maven.compiler.target>21<\/maven.compiler.target>/' plugin/pom.xml
      - name: Build with Maven
        run: cd plugin && mvn package -q
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: CardRedeem
          path: plugin/target/CardRedeem.jar
